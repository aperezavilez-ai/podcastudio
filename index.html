<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="PodcastStudio — Estudio profesional de podcast con cámaras USB, WiFi y Bluetooth, grabación HD y transmisión en vivo." />
  <meta name="theme-color" content="#e8612a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PodcastStudio" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="PodcastStudio — Estudio profesional de podcast" />
  <meta property="og:description" content="Graba y transmite tu podcast con múltiples cámaras, cintillos IA y posts virales." />
  <meta property="og:locale" content="es_LA" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="PodcastStudio" />
  <meta name="twitter:description" content="Estudio profesional de podcast en la nube." />
  <title>PodcastStudio — Estudio profesional de podcast</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function () {
      var h = location.hostname.toLowerCase();
      if (h.indexOf('podcaststudio') !== -1 || h === 'podcastudio.mx') {
        location.replace('https://www.podcastudio.mx' + location.pathname + location.search + location.hash);
      }
    })();
  </script>
</head>
<body>
  <div id="root">
    <div id="boot-fallback" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#08080b;color:#8888a0;font-family:Inter,system-ui,sans-serif;font-size:14px;padding:env(safe-area-inset-top) 24px 24px">
      Cargando PodcastStudio…
    </div>
  </div>
  <script>
    (function () {
      var SW_KEY = 'podcastudio_sw_version';
      var SW_VER = '11';
      try {
        if (localStorage.getItem(SW_KEY) === SW_VER || !('serviceWorker' in navigator)) return;
        var had = !!localStorage.getItem(SW_KEY);
        localStorage.setItem(SW_KEY, SW_VER);
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).then(function () {
          if (!('caches' in window)) {
            if (had) location.reload();
            return;
          }
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).then(function () {
            if (had) location.reload();
          });
        });
      } catch (e) { /* ignore */ }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
